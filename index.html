<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>写真、まっぷたつ。</title>
<style>
  :root{
    --dark:#17161B;
    --paper:#F3ECDD;
    --paper-dim:#E7DFCC;
    --safelight:#D6432E;
    --safelight-dim:#A8331F;
    --stone:#948E80;
    --ink:#23211D;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--dark);
    color:var(--paper);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  #app{max-width:460px;margin:0 auto;min-height:100vh;padding:0 20px 60px;}

  header{padding:36px 4px 22px;text-align:center;}
  .eyebrow{
    font-family:ui-monospace,'SF Mono','Courier New',monospace;
    font-size:.68rem;letter-spacing:.32em;color:var(--safelight);
    margin:0 0 10px;text-transform:uppercase;
  }
  h1{
    font-size:1.7rem;font-weight:800;letter-spacing:-.02em;
    margin:0;line-height:1.25;color:var(--paper);
  }
  .sub{
    font-size:.85rem;color:var(--stone);margin:10px 0 0;line-height:1.6;
  }

  .hidden{display:none !important;}
  .screen{animation:fadein .3s ease;}
  @keyframes fadein{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  @media (prefers-reduced-motion:reduce){.screen,.result-card,.slice-anim{animation:none !important;transition:none !important;}}

  /* upload tray */
  .tray{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    border:2px dashed rgba(243,236,221,.28);
    border-radius:16px;
    padding:52px 20px;
    text-align:center;
    cursor:pointer;
    transition:border-color .15s ease,background .15s ease;
  }
  .tray:hover,.tray:focus-visible{border-color:var(--safelight);background:rgba(214,67,46,.06);}
  .tray:active{background:rgba(214,67,46,.1);}
  .tray-icon{
    width:52px;height:52px;margin:0 auto 18px;
    border:2px solid var(--stone);border-radius:8px;
    position:relative;
  }
  .tray-icon::before{
    content:'';position:absolute;left:50%;top:50%;
    width:22px;height:16px;
    border:2px solid var(--stone);border-radius:2px;
    transform:translate(-50%,-50%);
  }
  .tray-icon::after{
    content:'';position:absolute;left:50%;top:50%;
    width:8px;height:8px;border-radius:50%;
    border:2px solid var(--stone);
    transform:translate(-50%,-140%);
  }
  .tray-label{font-weight:700;font-size:.95rem;color:var(--paper);margin:0 0 6px;}
  .tray-hint{font-size:.75rem;color:var(--stone);margin:0;}
  input[type=file]{display:none;}

  /* edit screen */
  .preview-card{
    border-radius:14px;overflow:hidden;background:var(--ink);
    margin-bottom:22px;
    box-shadow:0 8px 24px rgba(0,0,0,.35);
  }
  .preview-card img{display:block;width:100%;max-height:56vh;object-fit:contain;background:var(--ink);}
  .meta-row{
    display:flex;justify-content:space-between;align-items:center;
    font-family:ui-monospace,'SF Mono','Courier New',monospace;
    font-size:.7rem;color:var(--stone);letter-spacing:.04em;
    margin:0 0 22px;padding:0 2px;
  }

  .split-choice{font-size:.78rem;color:var(--stone);margin:0 0 12px;text-align:center;letter-spacing:.02em;}
  .split-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
  .split-btn{
    background:var(--paper);color:var(--ink);border:none;border-radius:12px;
    padding:20px 10px 16px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:12px;
    font-family:inherit;
  }
  .split-btn:active{background:var(--paper-dim);}
  .split-btn:focus-visible{outline:3px solid var(--safelight);outline-offset:2px;}
  .split-btn .label{font-weight:800;font-size:.9rem;}
  .split-btn .desc{font-size:.68rem;color:#6b665a;margin-top:-8px;}
  .icon-v{display:flex;gap:3px;width:44px;height:32px;}
  .icon-v span{flex:1;background:var(--ink);border-radius:2px;}
  .icon-h{display:flex;flex-direction:column;gap:3px;width:44px;height:32px;}
  .icon-h span{flex:1;background:var(--ink);border-radius:2px;}

  .link-btn{
    display:block;width:100%;text-align:center;background:none;border:none;
    color:var(--stone);font-size:.82rem;padding:6px;margin-top:6px;cursor:pointer;
    text-decoration:underline;text-underline-offset:3px;font-family:inherit;
  }
  .link-btn:active{color:var(--safelight);}

  /* results */
  .cut-banner{
    display:flex;align-items:center;gap:10px;margin-bottom:18px;
  }
  .cut-banner::before,.cut-banner::after{content:'';flex:1;height:1px;background:rgba(243,236,221,.2);}
  .cut-banner span{
    font-family:ui-monospace,'SF Mono','Courier New',monospace;
    font-size:.68rem;letter-spacing:.2em;color:var(--safelight);white-space:nowrap;
  }

  .results-row{display:flex;gap:14px;margin-bottom:8px;}
  .results-row.stacked{flex-direction:column;}

  .result-card{
    flex:1;background:var(--paper);border-radius:12px;overflow:hidden;
    box-shadow:0 6px 18px rgba(0,0,0,.3);
    opacity:0;transform:scale(.94);
    animation:sliceIn .45s cubic-bezier(.2,.8,.2,1) forwards;
  }
  .result-card:nth-child(2){animation-delay:.08s;}
  @keyframes sliceIn{to{opacity:1;transform:scale(1);}}
  .result-card img{display:block;width:100%;background:var(--ink);}
  .result-card .card-foot{padding:12px 12px 14px;}
  .result-card .card-label{
    font-weight:800;font-size:.8rem;color:var(--ink);margin:0 0 4px;
  }
  .result-card .card-dims{
    font-family:ui-monospace,'SF Mono','Courier New',monospace;
    font-size:.66rem;color:#6b665a;margin:0 0 10px;
  }
  .dl-btn{
    display:block;width:100%;text-align:center;background:var(--ink);color:var(--paper);
    border:none;border-radius:8px;padding:9px;font-size:.78rem;font-weight:700;
    text-decoration:none;cursor:pointer;font-family:inherit;
  }
  .dl-btn:active{background:var(--safelight);}
  .long-press-hint{
    text-align:center;font-size:.68rem;color:var(--stone);margin:14px 2px 26px;line-height:1.6;
  }

  .action-row{display:flex;flex-direction:column;gap:10px;margin-top:8px;}
  .btn-secondary{
    background:none;border:1.5px solid rgba(243,236,221,.3);color:var(--paper);
    border-radius:10px;padding:13px;font-size:.85rem;font-weight:700;cursor:pointer;
    font-family:inherit;
  }
  .btn-secondary:active{border-color:var(--safelight);color:var(--safelight);}
</style>
<link rel="apple-touch-icon" href="./icon.png">
</head>
<body>
<div id="app">
  <header>
    <p class="eyebrow">PRINT CUTTER</p>
    <h1>写真、まっぷたつ。</h1>
    <p class="sub">1枚の写真を、縦か横できれいに2分割します。</p>
  </header>

  <main>
    <section id="screen-upload" class="screen">
      <label class="tray" id="tray" tabindex="0">
        <div class="tray-icon"></div>
        <p class="tray-label">タップして写真を選ぶ</p>
        <p class="tray-hint">またはここにドラッグ＆ドロップ</p>
        <input type="file" id="fileInput" accept="image/*">
      </label>
    </section>

    <section id="screen-edit" class="screen hidden">
      <div class="preview-card">
        <img id="previewImg" alt="選択した写真のプレビュー">
      </div>
      <p class="meta-row"><span id="dimsLabel"></span><span id="sizeLabel"></span></p>

      <p class="split-choice">どちらで分割しますか？</p>
      <div class="split-grid">
        <button type="button" class="split-btn" id="btnVertical">
          <span class="icon-v"><span></span><span></span></span>
          <span class="label">縦に分割</span>
          <span class="desc">左右2枚になります</span>
        </button>
        <button type="button" class="split-btn" id="btnHorizontal">
          <span class="icon-h"><span></span><span></span></span>
          <span class="label">横に分割</span>
          <span class="desc">上下2枚になります</span>
        </button>
      </div>
      <button type="button" class="link-btn" id="btnChangePhoto1">別の写真を選び直す</button>
    </section>

    <section id="screen-result" class="screen hidden">
      <div class="cut-banner"><span id="cutLabel">CUT — VERTICAL</span></div>
      <div class="results-row" id="resultsRow"></div>
      <p class="long-press-hint">画像を長押しすると「写真に保存」もできます。</p>
      <div class="action-row">
        <button type="button" class="btn-secondary" id="btnResplit">別の分け方を試す</button>
        <button type="button" class="btn-secondary" id="btnChangePhoto2">別の写真にする</button>
      </div>
    </section>
  </main>
</div>

<script>
let loadedImage=null;
let loadedMime='image/png';
let loadedFileBaseName='photo';

const trayEl=document.getElementById('tray');
const fileInput=document.getElementById('fileInput');
const previewImg=document.getElementById('previewImg');
const dimsLabel=document.getElementById('dimsLabel');
const sizeLabel=document.getElementById('sizeLabel');
const resultsRow=document.getElementById('resultsRow');
const cutLabel=document.getElementById('cutLabel');

function showScreen(name){
  ['upload','edit','result'].forEach(s=>{
    document.getElementById('screen-'+s).classList.toggle('hidden', s!==name);
  });
}

function formatBytes(bytes){
  if(bytes<1024) return bytes+' B';
  if(bytes<1024*1024) return (bytes/1024).toFixed(0)+' KB';
  return (bytes/1024/1024).toFixed(1)+' MB';
}

function handleFile(file){
  if(!file || !file.type.startsWith('image/')) return;
  loadedMime = (file.type==='image/png') ? 'image/png' : 'image/jpeg';
  loadedFileBaseName = (file.name||'photo').replace(/\.[^.]+$/,'') || 'photo';
  const reader=new FileReader();
  reader.onload=(ev)=>{
    const img=new Image();
    img.onload=()=>{
      loadedImage=img;
      previewImg.src=ev.target.result;
      dimsLabel.textContent=`${img.naturalWidth} × ${img.naturalHeight} px`;
      sizeLabel.textContent=formatBytes(file.size);
      showScreen('edit');
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

trayEl.addEventListener('keydown',(e)=>{
  if(e.key==='Enter'||e.key===' '){e.preventDefault();fileInput.click();}
});
fileInput.addEventListener('change',(e)=>{
  if(e.target.files&&e.target.files[0]) handleFile(e.target.files[0]);
});
trayEl.addEventListener('dragover',(e)=>{e.preventDefault();});
trayEl.addEventListener('drop',(e)=>{
  e.preventDefault();
  if(e.dataTransfer.files&&e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

function makeCanvas(w,h){
  const c=document.createElement('canvas');
  c.width=w;c.height=h;
  return c;
}

function splitAndShow(direction){
  if(!loadedImage) return;
  const w=loadedImage.naturalWidth, h=loadedImage.naturalHeight;
  let partA,partB,dimsA,dimsB;

  if(direction==='vertical'){
    const w1=Math.floor(w/2), w2=w-w1;
    const cA=makeCanvas(w1,h), cB=makeCanvas(w2,h);
    cA.getContext('2d').drawImage(loadedImage,0,0,w1,h,0,0,w1,h);
    cB.getContext('2d').drawImage(loadedImage,w1,0,w2,h,0,0,w2,h);
    partA=cA;partB=cB;dimsA=`${w1} × ${h} px`;dimsB=`${w2} × ${h} px`;
  }else{
    const h1=Math.floor(h/2), h2=h-h1;
    const cA=makeCanvas(w,h1), cB=makeCanvas(w,h2);
    cA.getContext('2d').drawImage(loadedImage,0,0,w,h1,0,0,w,h1);
    cB.getContext('2d').drawImage(loadedImage,0,h1,w,h2,0,0,w,h2);
    partA=cA;partB=cB;dimsA=`${w} × ${h1} px`;dimsB=`${w} × ${h2} px`;
  }

  const ext=loadedMime==='image/png'?'png':'jpg';
  const quality=loadedMime==='image/png'?undefined:0.92;
  const dataA=partA.toDataURL(loadedMime,quality);
  const dataB=partB.toDataURL(loadedMime,quality);

  const labelA=direction==='vertical'?'① 左':'① 上';
  const labelB=direction==='vertical'?'② 右':'② 下';
  const suffixA=direction==='vertical'?'left':'top';
  const suffixB=direction==='vertical'?'right':'bottom';

  resultsRow.className='results-row'+(direction==='horizontal'?' stacked':'');
  resultsRow.innerHTML=`
    <div class="result-card">
      <img src="${dataA}" alt="分割された写真（${labelA}）">
      <div class="card-foot">
        <p class="card-label">${labelA}</p>
        <p class="card-dims">${dimsA}</p>
        <a class="dl-btn" href="${dataA}" download="${loadedFileBaseName}-${suffixA}.${ext}">ダウンロード</a>
      </div>
    </div>
    <div class="result-card">
      <img src="${dataB}" alt="分割された写真（${labelB}）">
      <div class="card-foot">
        <p class="card-label">${labelB}</p>
        <p class="card-dims">${dimsB}</p>
        <a class="dl-btn" href="${dataB}" download="${loadedFileBaseName}-${suffixB}.${ext}">ダウンロード</a>
      </div>
    </div>
  `;
  cutLabel.textContent = direction==='vertical' ? 'CUT — VERTICAL / 左右' : 'CUT — HORIZONTAL / 上下';
  showScreen('result');
}

document.getElementById('btnVertical').addEventListener('click',()=>splitAndShow('vertical'));
document.getElementById('btnHorizontal').addEventListener('click',()=>splitAndShow('horizontal'));
document.getElementById('btnChangePhoto1').addEventListener('click',resetAll);
document.getElementById('btnChangePhoto2').addEventListener('click',resetAll);
document.getElementById('btnResplit').addEventListener('click',()=>showScreen('edit'));

function resetAll(){
  loadedImage=null;
  fileInput.value='';
  previewImg.src='';
  resultsRow.innerHTML='';
  showScreen('upload');
}
</script>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>{
    regs.forEach(r=>r.unregister());
  }).then(()=>{
    navigator.serviceWorker.register('./sw.js');
  });
}
</script>
</body>
</html>
